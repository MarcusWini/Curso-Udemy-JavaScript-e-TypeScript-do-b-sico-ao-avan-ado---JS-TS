<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio aula 13</title>
</head>

<body>

    <script>
        const nome = prompt('Digite seu Nome Completo:');
        document.body.innerHTML += `<p style="font-size: 50px; text-align: center; background-color: red; color: white; padding: 20px;"><strong>Aula 11</strong></p> <br/><br/>`;
        document.body.innerHTML += `O seu nome é: <strong>${nome}</strong> <br/>`;
        document.body.innerHTML += `O seu nome tem <strong>${nome.length}</strong> letras <br/>`;
        document.body.innerHTML += `A segunda letra do seu nome é: <strong>${nome[1]}</strong> <br/>`;
        document.body.innerHTML += `Qual o primeiro indice da letra c no seu nome? <strong>${nome.indexOf('c')}</strong> <br/>`;
        document.body.innerHTML += `Qual o ultimo indice da letra i no seu nome? <strong>${nome.lastIndexOf('i')}</strong> <br/>`;
        document.body.innerHTML += `As ultimas 3 letras do seu nome são: <strong>${nome.slice(-4, -1)} </strong><br/>`;
        document.body.innerHTML += `As palavras do seu nome são: <strong>${nome.split(' ')}</strong> <br/>`;
        document.body.innerHTML += `O seu nome com letras maiusculas: <strong>${nome.toUpperCase()}</strong> <br/>`;
        document.body.innerHTML += `O seu nome com letras minusculas: <strong>${nome.toLowerCase()}</strong> <br/>`;
    </script>
</body>

</html>
