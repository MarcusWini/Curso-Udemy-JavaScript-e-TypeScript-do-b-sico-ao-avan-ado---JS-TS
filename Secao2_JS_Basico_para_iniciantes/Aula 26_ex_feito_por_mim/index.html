<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcule seu IMC</title>
    <link rel="stylesheet" href="/JAVASCRIPT/aula 26_ex_feito_por_mim/assets/css/style.css">
</head>

<body>

    <section class="container">
        <h1>Tabela IMC</h1>

        <div class="table">
            <table>

                <thead>
                    <tr>
                        <th>IMC</th>
                        <th>Resultado</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Menos do que 18,5</td>
                        <td>Abaixo do peso</td>
                    </tr>
                    <tr>
                        <td>Entre 18,5 e 24,9</td>
                        <td>Peso normal</td>
                    </tr>

                    <tr>
                        <td>Entre 25 e 29,9</td>
                        <td>Sobrepeso</td>
                    </tr>

                    <tr>
                        <td>Entre 30 e 34,9</td>
                        <td>Obesidade grau 1</td>
                    </tr>

                    <tr>
                        <td>Entre 35 e 39,9</td>
                        <td>Obesidade grau 2</td>
                    </tr>

                    <tr>
                        <td>Mais do que 40</td>
                        <td>Obesidade grau 3</td>
                    </tr>

                </tbody>
            </table>
        </div>

        <form>

            <H1>Calcule seu IMC</H1>

            <label for="Ppeso">Peso: </label>
            <input type="number" id="peso">


            <label for="altura">Altura: </label>
            <input type="number" id="altura">

            <button type="button" id="button">Calcular</button>

        </form>

        <div id="resultado">Resultado: </div>

    </section>

    <script src="/JAVASCRIPT/aula 26_ex_feito_por_mim/assets/js/main.js"></script>
</body>

</html>
